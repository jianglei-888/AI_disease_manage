<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 414px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 80px;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #e6f7ff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 32px;
            color: #1890ff;
            font-weight: bold;
        }
        
        .name {
            font-size: 24px;
            font-weight: 600;
        }
        
        .test-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .test-btn button {
            width: 280px;
            height: 180px;
            border: 3px solid #1890ff;
            border-radius: 90px;
            background-color: #fff;
            font-size: 32px;
            font-weight: 600;
            color: #1890ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-btn button:hover {
            background-color: #1890ff;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">头</div>
            <div class="name">姓名</div>
        </div>
        
        <div class="test-btn">
            <button>开始测试</button>
        </div>
    </div>
</body>
</html>
